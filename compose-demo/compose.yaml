name: compose-demo

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile

    ports:
      - "${APP_PORT:-8080}:5000"

    environment:
      APP_ENV: "${APP_ENV:-development}"
      REDIS_HOST: redis
      REDIS_PORT: "6379"

    depends_on:
      redis:
        condition: service_healthy

    networks:
      - application-network

  redis:
    image: redis:alpine

    command:
      - redis-server
      - --appendonly
      - "yes"

    volumes:
      - redis-data:/data

    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 3s
      retries: 5

    networks:
      - application-network

volumes:
  redis-data:

networks:
  application-network:
    driver: bridge