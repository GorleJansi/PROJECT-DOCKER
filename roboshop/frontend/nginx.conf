user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    types_hash_max_size 4096;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;

        error_page 404 /404.html;
        location = /404.html {
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
        }

        location /images/ {
            expires 5s;
            root /usr/share/nginx/html;
            try_files $uri /images/placeholder.jpg;
        }

        location /api/catalogue/ {
            set $catalogue_endpoint catalogue-c:8080;
            proxy_pass http://$catalogue_endpoint/;
        }

        location /api/user/ {
            set $user_endpoint user-c:8080;
            proxy_pass http://$user_endpoint/;
        }

        location /api/cart/ {
            set $cart_endpoint cart-c:8080;
            proxy_pass http://$cart_endpoint/;
        }

        location /api/shipping/ {
            set $shipping_endpoint shipping-c:8080;
            proxy_pass http://$shipping_endpoint/;
        }

        location /api/payment/ {
            set $payment_endpoint payment-c:8080;
            proxy_pass http://$payment_endpoint/;
        }

        location /health {
            stub_status on;
            access_log off;
        }
    }
}
